name: fast_printing
description: Pakistan's Fastest Custom Printing & Packaging — Official Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.2.0

  # HTTP & networking
  dio: ^5.4.3
  connectivity_plus: ^6.0.3

  # Google Sign-In (no Firebase — sends ID token to our backend)
  google_sign_in: ^6.2.1

  # Secure local storage (JWT token)
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # Images
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  shimmer: ^3.0.0

  # UI components
  smooth_page_indicator: ^1.2.0+3
  carousel_slider: ^5.0.0
  flutter_svg: ^2.0.10+1
  badges: ^3.1.2

  # Fonts
  google_fonts: ^6.2.1

  # Utilities
  url_launcher: ^6.3.0
  intl: ^0.19.0
  timeago: ^3.7.0
  uuid: ^4.5.1
  logger: ^2.4.0

  # Forms
  formz: ^0.7.0

  # DI
  get_it: ^8.0.2
  injectable: ^2.4.4

  # Code generation annotations
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  injectable_generator: ^2.6.2
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/data/

